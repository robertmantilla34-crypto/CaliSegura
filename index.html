<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaliSegura</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
}
header{
  background:#d32f2f;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}
#map{
  height:90vh;
  width:100%;
}
.info{
  padding:10px;
  background:white;
  text-align:center;
  font-size:14px;
}
</style>
</head>

<body>

<header>
🛡️ CaliSegura
<br>
<small>MI CALI MAS SEGURA</small>
</header>

<button onclick="admin()"
style="
margin:10px;
padding:10px;
background:black;
color:white;
border:none;
border-radius:8px;">
🔐 Administrador
</button>
<div style="padding:10px;">

<input
id="buscarBarrio"
type="text"
placeholder="Buscar barrio..."
style="
padding:10px;
width:70%;
border-radius:8px;
border:1px solid #ccc;
">

<button
onclick="buscarBarrio()"
style="
padding:10px;
background:green;
color:white;
border:none;
border-radius:8px;
">
Buscar
</button>

</div>
<button onclick="emergencia()">
🚔 Emergencia
</button>
</div>

<div class="info">
📍 Tu ubicación se mostrará en el mapa
<div id="estado"
style="
margin:10px;
padding:15px;
background:#fff3cd;
border-radius:10px;">
🟡 Estado: monitoreando ubicación
</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// --- Variables globales ---
var zonasRojas = JSON.parse(localStorage.getItem('zonasRojas')) || [
    {lat:3.4200, lng:-76.4900, radio:1000}
];
var adminMode = false;
var primerAviso = true; // para centrar mapa solo una vez

// --- Inicializar mapa ---
var map = L.map('map').setView([3.4516,-76.5320],11);

// --- Dibujar zonas rojas cargadas ---
zonasRojas.forEach(z => {
    L.circle([z.lat, z.lng], {
        color:'red', fillColor:'red', fillOpacity:0.3, radius:z.radio
    }).addTo(map).bindPopup("⚠️ Zona de alto riesgo");
});

// --- Capa base OSM ---
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19,
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// --- Botón para centrar en usuario ---
var boton = L.control({position:'topright'});
boton.onAdd = function(map){
    var div = L.DomUtil.create('div');
    div.innerHTML = `
    <button onclick="centrarUsuario()"
        style="
        padding:10px;
        background:red;
        color:white;
        border:none;
        border-radius:8px;
        font-weight:bold;">
        📍 Mi ubicación
    </button>`;
    return div;
};
boton.addTo(map);

// --- Función centrar mapa en el marcador del usuario ---
function centrarUsuario(){
    if(window.userMarker){
        map.setView(window.userMarker.getLatLng(), 15);
    }
}

// --- Geolocalización en tiempo real ---
if(navigator.geolocation){
    navigator.geolocation.watchPosition(function(pos){
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        // Centrar mapa en la primera posición
        if(primerAviso){
            map.setView([lat, lng], 15);
            primerAviso = false;
        }

        // Comprobar cada zona de riesgo
        zonasRojas.forEach(z => {
            var distancia = map.distance([lat, lng], [z.lat, z.lng]);
            if(distancia < z.radio){
                if(!window.alertaMostrada){
                    alert("⚠️ Atención: estás en una zona de alto riesgo");
                    window.alertaMostrada = true;
                }
            } else {
                window.alertaMostrada = false;
            }
        });

        // Actualizar marcador del usuario
        if(window.userMarker){
            userMarker.setLatLng([lat, lng]);
        } else {
            window.userMarker = L.marker([lat, lng])
                .addTo(map)
                .bindPopup("📍 Tu ubicación")
                .openPopup();
        }

        // --- Geocodificación inversa con Nominatim ---
        const url = 
          `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&addressdetails=1&accept-language=es`;
        fetch(url)
          .then(response => response.json())
          .then(data => {
              const barrio = data.address.neighbourhood || data.address.suburb || "No disponible";
              const comuna = data.address.city_district || data.address.county || "";
              document.getElementById("estado").innerHTML =
                  "📍 Tu ubicación actual" +
                  "<br>🏘️ Barrio: " + barrio +
                  (comuna ? "<br>📌 Comuna: " + comuna : "");
              if(window.userMarker){
                  userMarker.bindPopup("📍 " + barrio);
              }
          })
          .catch(error => {
              console.log("Error en geocodificación inversa:", error);
          });

    },
    function(error){
        console.error("Error geolocalización:", error);
        document.getElementById("estado").innerHTML =
            "❌ No fue posible obtener tu ubicación";
    });
}

// --- Modo Administrador ---
function admin(){
    let clave = prompt("Ingrese contraseña");
    if(clave === "cali2026"){
        adminMode = true;
        alert("Bienvenido Administrador. Haz clic en el mapa para agregar zonas.");
        map.on('click', function(e){
            if(!adminMode) return;
            if(confirm("Agregar zona de alto riesgo en este punto?")){
                let newZone = {
                    lat: e.latlng.lat,
                    lng: e.latlng.lng,
                    radio: 1000
                };
                zonasRojas.push(newZone);
                localStorage.setItem('zonasRojas', JSON.stringify(zonasRojas));
                L.circle([newZone.lat, newZone.lng], {
                    color:'red', fillColor:'red', fillOpacity:0.3, radius:newZone.radio
                }).addTo(map).bindPopup("⚠️ Zona de alto riesgo");
            }
        });
    } else {
        alert("Contraseña incorrecta");
    }
}

// Funciones existentes
async function buscarBarrio(){
    // ... (tu lógica para buscar en la lista, si aplica)
}
function emergencia(){
    alert(
        "Emergencias Cali\n" +
        "Policía: 123\n" +
        "Bomberos: 119"
    );
}
fetch("datos/barrios.geojson")
.then(response => response.json())
.then(data => {

    L.geoJSON(data, {

    style: function(feature){

        let barrio = feature.properties.barrio;

        if(
            barrio === "Potrero Grande" ||
            barrio === "Mojica" ||
            barrio === "Charco Azul"
        ){
            return {
                color:"red",
                fillColor:"red",
                fillOpacity:0.5
            };
        }

        if(
            barrio === "Ciudadela Floralia"
        ){
            return {
                color:"orange",
                fillColor:"orange",
                fillOpacity:0.5
            };
        }

        return {
            color:"green",
            fillColor:"green",
            fillOpacity:0.3
        };

    },

    onEachFeature: function(feature, layer){

        layer.bindPopup(
            "🏘️ Barrio: " +
            feature.properties.barrio +
            "<br>📍 Comuna: " +
            feature.properties.comuna
        );

    }

}).addTo(map);

    console.log("GeoJSON cargado correctamente");

})
.catch(error => {

    console.log("Error cargando GeoJSON:", error);

});
</script>

</body>
</html>
