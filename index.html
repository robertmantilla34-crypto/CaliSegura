<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaliSegura</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
}

header{
background:#d32f2f;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#map{
height:90vh;
width:100%;
}

.info{
padding:10px;
background:white;
text-align:center;
font-size:14px;
}
</style>
</head>

<body>

<header>
🛡️ CaliSegura
<br>
<small>MI CALI MAS SEGURA</small>
</header>

<button onclick="admin()"
style="
margin:10px;
padding:10px;
background:black;
color:white;
border:none;
border-radius:8px;">
🔐 Administrador
</button>
<div style="padding:10px;">
  
<input
id="buscarBarrio"
type="text"
placeholder="Buscar barrio..."
style="
padding:10px;
width:70%;
border-radius:8px;
border:1px solid #ccc;
">

<button
onclick="buscarBarrio()"
style="
padding:10px;
background:green;
color:white;
border:none;
border-radius:8px;
">
Buscar
</button>
  
</div>
<button onclick="emergencia()">
🚔 Emergencia
</button>

</div>
<div class="info">
📍 Tu ubicación se mostrará en el mapa
<div id="estado"
style="
margin:10px;
padding:15px;
background:#fff3cd;
border-radius:10px;">
 📡 Estado: monitoreando ubicación
</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>


var map = L.map('map').setView([3.4516,-76.5320],11);
  var zonaRoja = L.circle(
    [3.4200,-76.4900],
    {
        color:'red',
        fillColor:'red',
        fillOpacity:0.3,
        radius:1000
    }
).addTo(map);

zonaRoja.bindPopup("⚠️ Zona de alto riesgo");

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

  var boton = L.control({position:'topright'});

boton.onAdd = function(map){
    var div = L.DomUtil.create('div');
    div.innerHTML = `
    <button onclick="centrarUsuario()"
    style="
    padding:10px;
    background:red;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    ">
    📍 Mi ubicación
    </button>`;
    return div;
};

boton.addTo(map);

function centrarUsuario(){
    if(window.userMarker){
        map.setView(window.userMarker.getLatLng(),15);
    }
}
if(navigator.geolocation){

navigator.geolocation.watchPosition(function(pos){

var lat = pos.coords.latitude;
var lng = pos.coords.longitude;
  var distancia = map.distance(
    [lat,lng],
    [3.4200,-76.4900]
);

if(distancia < 1000){

    if(!window.alertaMostrada){

        alert("⚠️ Atención: estás ingresando a una zona de alto riesgo");

        window.alertaMostrada = true;

    }

}else{

    window.alertaMostrada = false;

}

navigator.geolocation.getCurrentPosition(async (position) => {

    const lat = position.coords.latitude;
    const lng = position.coords.longitude;

    const API_KEY = "TU_API_KEY";

    try {

        const response = await fetch(
            `https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&language=es&key=${API_KEY}`
        );

        const data = await response.json();

        let barrio = "";
        let comuna = "";
        let ciudad = "";
        let departamento = "";

        data.results.forEach(result => {
            result.address_components.forEach(component => {

                if (
                    component.types.includes("neighborhood") ||
                    component.types.includes("sublocality") ||
                    component.types.includes("sublocality_level_1")
                ) {
                    barrio = component.long_name;
                }

                if (component.types.includes("administrative_area_level_3")) {
                    comuna = component.long_name;
                }

                if (component.types.includes("locality")) {
                    ciudad = component.long_name;
                }

                if (component.types.includes("administrative_area_level_1")) {
                    departamento = component.long_name;
                }

            });
        });

        document.getElementById("estado").innerHTML = `
            📍 <b>Tu ubicación actual</b>
            <br>🏘️ Barrio: ${barrio || "No disponible"}
            <br>📌 Comuna: ${comuna || "No disponible"}
            <br>🌆 ${ciudad}
            <br>🗺️ ${departamento}
        `;

        const popupText = `
            📍 ${barrio || "Ubicación actual"}<br>
            ${ciudad}, ${departamento}
        `;

        if (window.userMarker) {
            userMarker.setLatLng([lat, lng]);
            userMarker.bindPopup(popupText);
        } else {
            window.userMarker = L.marker([lat, lng])
                .addTo(map)
                .bindPopup(popupText)
                .openPopup();
        }

    } catch (error) {
        document.getElementById("estado").innerHTML =
            "❌ Error obteniendo la dirección";
    }

};


}
function admin(){

let clave = prompt("Ingrese contraseña");

if(clave === "cali2026"){

    alert("Bienvenido Administrador");

}else{

    alert("Contraseña incorrecta");

}

}

function buscarBarrio(){

const barrios = [
{nombre:"Potrero Grande",riesgo:"rojo"},
{nombre:"Mojica",riesgo:"rojo"},
{nombre:"Marroquin",riesgo:"rojo"},
{nombre:"Villa del Lago",riesgo:"rojo"},
{nombre:"Charco Azul",riesgo:"rojo"},

{nombre:"Ciudad Cordoba",riesgo:"amarillo"},
{nombre:"El Vallado",riesgo:"amarillo"},
{nombre:"Siete de Agosto",riesgo:"amarillo"},
{nombre:"Lleras Restrepo",riesgo:"amarillo"},
{nombre:"Ulpiano Lloreda",riesgo:"amarillo"},

{nombre:"Valle del Lili",riesgo:"verde"},
{nombre:"Ciudad Jardin",riesgo:"verde"},
{nombre:"Pance",riesgo:"verde"},
{nombre:"Villa Colombia",riesgo:"verde"},
{nombre:"La Nueva Base",riesgo:"verde"},
{nombre:"La Base",riesgo:"verde"}
];

let nombre = document.getElementById("buscarBarrio").value;

let encontrado = barrios.find(
b => b.nombre.toLowerCase() === nombre.toLowerCase()
);

if(encontrado){

alert(
"Barrio: " +
encontrado.nombre +
"\nRiesgo: " +
encontrado.riesgo
);

}else{

alert("Barrio no encontrado");

}

}
function emergencia(){

alert(
"Emergencias Cali\n" +
"Policía: 123\n" +
"Bomberos: 119"
);

}
</script>

</body>
</html>
