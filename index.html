<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaliSegura</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
}

header{
background:#d32f2f;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#map{
height:90vh;
width:100%;
}

.info{
padding:10px;
background:white;
text-align:center;
font-size:14px;
}
</style>
</head>

<body>

<header>
🛡️ CaliSegura
<br>
<small>MI CALI MAS SEGURA</small>
</header>

<button onclick="admin()"
style="
margin:10px;
padding:10px;
background:black;
color:white;
border:none;
border-radius:8px;">
🔐 Administrador
</button>
<div style="padding:10px;">

<input
id="buscarBarrio"
type="text"
placeholder="Buscar barrio..."
style="
padding:10px;
width:70%;
border-radius:8px;
border:1px solid #ccc;">

<button
onclick="buscarBarrio()"
style="
padding:10px;
background:green;
color:white;
border:none;
border-radius:8px;">
Buscar
</button>

<div id="resultadoBarrio"
style="
margin-top:10px;
padding:15px;
border-radius:10px;
font-weight:bold;
background:#f5f5f5;">
Busca un barrio para ver su nivel de riesgo
</div>
<button onclick="emergencia()">
🚔 Emergencia
</button>

</div>
<div class="info">
📍 Tu ubicación se mostrará en el mapa
<div id="estado"
style="
margin:10px;
padding:15px;
background:#fff3cd;
border-radius:10px;">
🟡 Estado: monitoreando ubicación
</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([3.4516,-76.5320],11);
  console.log("Mapa iniciado");
  var zonaRoja = L.circle(
    [3.4200,-76.4900],
    {
        color:'red',
        fillColor:'red',
        fillOpacity:0.3,
        radius:1000
    }
).addTo(map);

zonaRoja.bindPopup("⚠️ Zona de alto riesgo");

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

  var boton = L.control({position:'topright'});

boton.onAdd = function(map){
    var div = L.DomUtil.create('div');
    div.innerHTML = `
    <button onclick="centrarUsuario()"
    style="
    padding:10px;
    background:red;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    ">
    📍 Mi ubicación
    </button>`;
    return div;
};

boton.addTo(map);

function centrarUsuario(){
    if(window.userMarker){
        map.setView(window.userMarker.getLatLng(),15);
    }
}

if(navigator.geolocation){

navigator.geolocation.watchPosition(
  function(pos){

var lat = pos.coords.latitude;
var lng = pos.coords.longitude;

var distancia = map.distance(
    [lat,lng],
    [3.4200,-76.4900]
);

if(distancia < 1000){

    if(!window.alertaMostrada){
        alert("⚠️ Atención: estás ingresando a una zona de alto riesgo");
        window.alertaMostrada = true;
    }

}else{
    window.alertaMostrada = false;
}

document.getElementById("estado").innerHTML =
"📍 Tu ubicación actual<br>Lat: " +
lat.toFixed(5) +
"<br>Lng: " +
lng.toFixed(5);

if(window.userMarker){
    userMarker.setLatLng([lat,lng]);
}else{
    window.userMarker = L.marker([lat,lng])
    .addTo(map)
    .bindPopup("Tu ubicación")
    .openPopup();
}

},                                    
function(error){
    document.getElementById("estado").innerHTML =
    "❌ No fue posible obtener tu ubicación";
}
);

function admin(){

let clave = prompt("Ingrese contraseña");

if(clave === "cali2026"){

    alert("Bienvenido Administrador");

}else{

    alert("Contraseña incorrecta");

}

}
async function buscarBarrio(){

let nombre = document
.getElementById("buscarBarrio")
.value
.toLowerCase();

try{

const respuesta =
await fetch("datos/barrios.json");

const barrios =
await respuesta.json();

const encontrado =
barrios.find(
b => b.nombre.toLowerCase().includes(nombre)
);

if(encontrado){

let color = "#4caf50";

if(encontrado.riesgo === "rojo"){
    color = "#f44336";
}

if(encontrado.riesgo === "amarillo"){
    color = "#ff9800";
}

document.getElementById("resultadoBarrio").innerHTML =
"📍 " + encontrado.nombre +
"<br>Riesgo: " + encontrado.riesgo;

document.getElementById("resultadoBarrio").style.background =
color;

}else{

alert("Barrio no encontrado");

}

}catch(error){

alert("Error cargando barrios");

}

}
function emergencia(){

alert(
"Emergencias Cali\n" +
"Policía: 123\n" +
"Bomberos: 119"
);

}

</script>

</body>
</html>
